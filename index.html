<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التعلم التفاعلية | أحدث الملفات من تليجرام</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
        }

        /* أنيميشن الخلفية */
        .bg-animation {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation span {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* الهيدر الاحترافي */
        .header {
            text-align: center;
            padding: 50px 20px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            margin-bottom: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: slideDown 0.8s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            font-size: 3em;
            background: linear-gradient(135deg, #fff, #a8c0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .header p {
            color: rgba(255,255,255,0.7);
            font-size: 1.1em;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 10px 25px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }

        .stat-number {
            font-size: 1.8em;
            font-weight: bold;
            color: #ffd700;
        }

        /* أقسام المواد - شبكة احترافية */
        .subjects-section {
            margin-bottom: 50px;
        }

        .section-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            padding: 8px 20px;
            border-radius: 50px;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .subject-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }

        .subject-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0));
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .subject-card:hover::before {
            transform: translateX(0);
        }

        .subject-card:hover {
            transform: translateY(-10px) scale(1.02);
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,215,0,0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .subject-card.active {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,140,0,0.2));
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
        }

        .subject-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .subject-name {
            font-size: 1.3em;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .subject-count {
            font-size: 0.85em;
            color: rgba(255,255,255,0.6);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* قسم عرض الملفات */
        .files-main {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .files-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }

        .files-title {
            font-size: 1.5em;
            font-weight: 700;
        }

        .files-title i {
            color: #ffd700;
            margin-left: 10px;
        }

        .refresh-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
        }

        .refresh-btn:hover {
            background: rgba(255,215,0,0.3);
            transform: rotate(180deg);
        }

        /* قائمة الملفات */
        .files-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
        }

        .files-list::-webkit-scrollbar {
            width: 8px;
        }

        .files-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .files-list::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 10px;
        }

        .file-item {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .file-item:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,215,0,0.3);
            transform: translateX(5px);
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-size: 1.05em;
            font-weight: 500;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .file-name i {
            color: #ffd700;
            font-size: 1.2em;
        }

        .file-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            font-size: 0.8em;
            color: rgba(255,255,255,0.6);
        }

        .file-meta span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .download-btn {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            padding: 10px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255,215,0,0.4);
        }

        /* حالة التحميل والخطأ */
        .loading-state, .empty-state {
            text-align: center;
            padding: 60px;
        }

        .loading-state i, .empty-state i {
            font-size: 3em;
            color: #ffd700;
            margin-bottom: 15px;
        }

        /* الفوتر */
        .footer {
            text-align: center;
            padding: 30px;
            margin-top: 40px;
            color: rgba(255,255,255,0.5);
            font-size: 0.9em;
        }
        
        .creator {
            margin-top: 10px;
            color: #ffd700;
            font-weight: 500;
            letter-spacing: 1px;
        }
        
        .creator i {
            margin: 0 5px;
        }

        /* توافق الجوال */
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8em; }
            .subjects-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }
            .subject-card { padding: 18px; }
            .subject-name { font-size: 1.1em; }
            .files-main { padding: 20px; }
            .file-item { flex-direction: column; text-align: center; }
            .download-btn { width: 100%; justify-content: center; }
            .file-meta { justify-content: center; }
        }
    </style>
</head>
<body>

<div class="bg-animation" id="bgAnimation"></div>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-graduation-cap"></i> منصة التعلم التفاعلية</h1>
        <p>آخر الملفات المضافة من قناة التليجرام - تحديث تلقائي كل 30 ثانية</p>
        <div class="stats">
            <div class="stat-card"><span class="stat-number" id="totalFiles">0</span> <i class="fas fa-file"></i> ملف</div>
            <div class="stat-card"><span class="stat-number" id="lastUpdate">--</span> <i class="fas fa-clock"></i> آخر تحديث</div>
        </div>
    </div>

    <div class="subjects-section">
        <div class="section-badge"><i class="fas fa-book"></i> المواد الدراسية</div>
        <div class="subjects-grid" id="subjectsGrid"></div>
    </div>

    <div class="files-main">
        <div class="files-header">
            <div class="files-title"><i class="fas fa-file-alt"></i> <span id="selectedSubjectName">جميع الملفات</span></div>
            <button class="refresh-btn" onclick="refreshData()"><i class="fas fa-sync-alt"></i> تحديث</button>
        </div>
        <div class="files-list" id="filesList">
            <div class="loading-state"><i class="fas fa-spinner fa-spin"></i><br>جاري تحميل الملفات...</div>
        </div>
    </div>

    <div class="footer">
        <i class="fas fa-telegram"></i> متصل بقناة التليجرام | يتم تحديث الملفات تلقائياً
        <div class="creator">
            <i class="fas fa-code"></i> من إعداد <strong>ميمون كاظم</strong> <i class="fas fa-heart" style="color: #ff6b6b;"></i>
        </div>
    </div>
</div>

<script>
    // ========================
    // إعدادات Google Sheets
    // ========================
    // ID جدول البيانات المقدم من المستخدم
    const SHEET_ID = '10WQY9mC_YPq0mwaXL5kZV6-s7_iTikwXw8UKkppCxu4';
    
    // المواد الدراسية
    const subjects = [
        { id: 'all', name: '📚 الجميع', icon: 'fa-folder-open', color: '#ffffff', hashtag: null },
        { id: 'reading', name: '📖 Reading', icon: 'fa-book-open', color: '#4CAF50', hashtag: '#Reading' },
        { id: 'speaking', name: '🎙️ Speaking', icon: 'fa-microphone-alt', color: '#2196F3', hashtag: '#Speaking' },
        { id: 'writing', name: '✍️ Writing', icon: 'fa-pen-fancy', color: '#9C27B0', hashtag: '#Writing' },
        { id: 'grammar', name: '📐 Grammar', icon: 'fa-language', color: '#FF9800', hashtag: '#Grammar' },
        { id: 'phonetics', name: '🔊 Phonetics', icon: 'fa-head-side-vr', color: '#00BCD4', hashtag: '#Phonetics' },
        { id: 'psychology', name: '🧠 علم النفس', icon: 'fa-brain', color: '#E91E63', hashtag: '#علم_النفس' },
        { id: 'humanrights', name: '⚖️ حقوق الانسان', icon: 'fa-gavel', color: '#F44336', hashtag: '#حقوق_الانسان' },
        { id: 'arabic', name: 'اللغة العربية', icon: 'fa-mosque', color: '#4CAF50', hashtag: '#عربي' },
        { id: 'education', name: '🏫 أسس التربية', icon: 'fa-chalkboard-user', color: '#FF5722', hashtag: '#أسس_التربية' },
        { id: 'computers', name: '💻 حاسبات', icon: 'fa-laptop-code', color: '#607D8B', hashtag: '#حاسبات' }
    ];

    let allFilesData = [];
    let currentSubject = 'all';

    // ========================
    // إنشاء الخلفية المتحركة
    // ========================
    function createBackgroundAnimation() {
        const container = document.getElementById('bgAnimation');
        for (let i = 0; i < 50; i++) {
            const span = document.createElement('span');
            const size = Math.random() * 30 + 10;
            span.style.width = size + 'px';
            span.style.height = size + 'px';
            span.style.left = Math.random() * 100 + '%';
            span.style.animationDelay = Math.random() * 20 + 's';
            span.style.animationDuration = Math.random() * 15 + 10 + 's';
            container.appendChild(span);
        }
    }

    // ========================
    // عرض أقسام المواد
    // ========================
    function displaySubjects() {
        const container = document.getElementById('subjectsGrid');
        container.innerHTML = subjects.map(subject => `
            <div class="subject-card" onclick="selectSubject('${subject.id}')" data-subject="${subject.id}">
                <div class="subject-icon"><i class="fas ${subject.icon}"></i></div>
                <div class="subject-name">${subject.name}</div>
                <div class="subject-count">
                    <i class="fas fa-file"></i>
                    <span id="count-${subject.id}">0</span> ملف
                </div>
            </div>
        `).join('');
    }

    // ========================
    // جلب البيانات من Google Sheets
    // ========================
    async function fetchFilesFromSheets() {
        try {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=0`;
            const response = await fetch(url);
            const text = await response.text();
            const jsonString = text.substring(47, text.length - 2);
            const data = JSON.parse(jsonString);
            const rows = data.table.rows;
            const files = [];

            for (let i = 1; i < rows.length; i++) {
                const row = rows[i].c;
                if (!row || row.length < 6) continue;

                const fileName = row[1]?.v || 'ملف بدون اسم';
                const fileUrl = row[2]?.v || '#';
                const subjectTag = row[3]?.v || '';
                const date = row[4]?.v || new Date().toISOString();
                const fileType = row[5]?.v || 'application/octet-stream';

                // تحديد المادة من الهاشتاج
                let subjectId = 'general';
                for (let sub of subjects) {
                    if (sub.hashtag && subjectTag && subjectTag.includes(sub.hashtag)) {
                        subjectId = sub.id;
                        break;
                    }
                }

                if (fileUrl !== '#') {
                    files.push({
                        id: i,
                        name: fileName,
                        url: fileUrl,
                        subject: subjectId,
                        subjectTag: subjectTag || 'بدون تصنيف',
                        date: date,
                        type: fileType
                    });
                }
            }

            return files.reverse();
        } catch (error) {
            console.error('خطأ في جلب الملفات:', error);
            return [];
        }
    }

    // ========================
    // تحديث إحصائيات المواد
    // ========================
    function updateSubjectsCount(files) {
        subjects.forEach(subject => {
            let count;
            if (subject.id === 'all') {
                count = files.length;
            } else {
                count = files.filter(f => f.subject === subject.id).length;
            }
            const countElement = document.getElementById(`count-${subject.id}`);
            if (countElement) countElement.textContent = count;
        });
        
        // تحديث العدد الكلي في الهيدر
        document.getElementById('totalFiles').textContent = files.length;
        const now = new Date();
        document.getElementById('lastUpdate').textContent = now.toLocaleTimeString('ar-EG');
    }

    // ========================
    // عرض الملفات حسب المادة المختارة
    // ========================
    async function selectSubject(subjectId) {
        currentSubject = subjectId;
        
        // تحديث الوضع النشط
        document.querySelectorAll('.subject-card').forEach(card => {
            card.classList.remove('active');
            if (card.getAttribute('data-subject') === subjectId) {
                card.classList.add('active');
            }
        });
        
        // تحديث العنوان
        const selectedSubject = subjects.find(s => s.id === subjectId);
        document.getElementById('selectedSubjectName').innerHTML = 
            subjectId === 'all' ? 'جميع الملفات' : selectedSubject?.name || 'الملفات';
        
        // إظهار حالة التحميل
        const filesContainer = document.getElementById('filesList');
        filesContainer.innerHTML = '<div class="loading-state"><i class="fas fa-spinner fa-spin"></i><br>جاري التحميل...</div>';
        
        // جلب الملفات وعرضها
        if (allFilesData.length === 0) {
            allFilesData = await fetchFilesFromSheets();
            updateSubjectsCount(allFilesData);
        }
        
        let filteredFiles = allFilesData;
        if (subjectId !== 'all') {
            filteredFiles = allFilesData.filter(file => file.subject === subjectId);
        }
        
        if (filteredFiles.length === 0) {
            filesContainer.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><br>📭 لا توجد ملفات في هذه المادة حتى الآن</div>';
            return;
        }
        
        // عرض الملفات
        filesContainer.innerHTML = filteredFiles.map(file => `
            <div class="file-item">
                <div class="file-info">
                    <div class="file-name">
                        <i class="fas ${getFileIcon(file.type)}"></i>
                        ${file.name}
                    </div>
                    <div class="file-meta">
                        <span><i class="fas fa-calendar-alt"></i> ${formatDate(file.date)}</span>
                        <span><i class="fas fa-tag"></i> ${file.subjectTag}</span>
                        <span><i class="fas ${getTypeIcon(file.type)}"></i> ${getFileTypeName(file.type)}</span>
                    </div>
                </div>
                <a href="${file.url}" class="download-btn" target="_blank">
                    <i class="fas fa-download"></i> تحميل
                </a>
            </div>
        `).join('');
    }

    // ========================
    // تحديث البيانات (رفرش)
    // ========================
    async function refreshData() {
        allFilesData = await fetchFilesFromSheets();
        updateSubjectsCount(allFilesData);
        selectSubject(currentSubject);
        
        // إظهار إشعار صغير
        const refreshBtn = document.querySelector('.refresh-btn');
        refreshBtn.style.transform = 'rotate(180deg)';
        setTimeout(() => { refreshBtn.style.transform = ''; }, 500);
    }

    // ========================
    // دوال مساعدة
    // ========================
    function formatDate(dateString) {
        if (!dateString) return 'تاريخ غير محدد';
        try {
            const date = new Date(dateString);
            return date.toLocaleDateString('ar-EG', { year: 'numeric', month: 'short', day: 'numeric' });
        } catch {
            return dateString.split('T')[0];
        }
    }

    function getFileIcon(mimeType) {
        if (!mimeType) return 'fa-file';
        if (mimeType.includes('pdf')) return 'fa-file-pdf';
        if (mimeType.includes('image')) return 'fa-file-image';
        if (mimeType.includes('video')) return 'fa-file-video';
        if (mimeType.includes('audio')) return 'fa-file-audio';
        if (mimeType.includes('zip') || mimeType.includes('rar')) return 'fa-file-archive';
        if (mimeType.includes('word') || mimeType.includes('document')) return 'fa-file-word';
        if (mimeType.includes('excel') || mimeType.includes('sheet')) return 'fa-file-excel';
        return 'fa-file';
    }

    function getTypeIcon(mimeType) {
        if (!mimeType) return 'fa-file';
        if (mimeType.includes('pdf')) return 'fa-file-pdf';
        if (mimeType.includes('image')) return 'fa-camera';
        if (mimeType.includes('video')) return 'fa-video';
        return 'fa-file';
    }

    function getFileTypeName(mimeType) {
        if (!mimeType) return 'ملف';
        if (mimeType.includes('pdf')) return 'PDF';
        if (mimeType.includes('image')) return 'صورة';
        if (mimeType.includes('video')) return 'فيديو';
        if (mimeType.includes('zip')) return 'مضغوط';
        if (mimeType.includes('word')) return 'Word';
        if (mimeType.includes('excel')) return 'Excel';
        return 'ملف';
    }

    // ========================
    // تشغيل الموقع
    // ========================
    createBackgroundAnimation();
    displaySubjects();
    refreshData();
    
    // تحديث تلقائي كل 30 ثانية
    setInterval(refreshData, 30000);
</script>
</body>
</html>
